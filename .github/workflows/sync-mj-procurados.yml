name: Sync MJ procurados

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Limite opcional de registros para teste manual"
        required: false
        default: ""
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: sync-mj-procurados
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Sync public records to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PREFIX: mj-procurados
          SCRAPE_DELAY_SECONDS: "0.5"
          FACE_DETECTION_MODEL: hog
          SYNC_LIMIT: ${{ github.event.inputs.limit }}
        run: |
          if [ -n "$SYNC_LIMIT" ]; then
            python scripts/sync_mj_procurados.py --limit "$SYNC_LIMIT"
          else
            python scripts/sync_mj_procurados.py
          fi
