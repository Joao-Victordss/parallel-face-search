name: Sync MJ procurados

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Limite opcional de registros para teste manual"
        required: false
        default: ""
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: sync-mj-procurados
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install the face_search package
        run: pip install -e .

      - name: Cache InsightFace models
        uses: actions/cache@v4
        with:
          path: ~/.insightface
          key: insightface-buffalo_l

      - name: Sync public records to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PREFIX: mj-procurados
          SCRAPE_DELAY_SECONDS: "0.5"
          ONNX_PROVIDER: cpu
          INSIGHTFACE_PACK: buffalo_l
          SYNC_LIMIT: ${{ github.event.inputs.limit }}
        run: |
          if [ -n "$SYNC_LIMIT" ]; then
            face-search-sync --limit "$SYNC_LIMIT"
          else
            face-search-sync
          fi
